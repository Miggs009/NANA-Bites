<!DOCTYPE html>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100">

  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-gray-800 text-white p-4 space-y-4">
      <button onclick="showTab('dashboard')" class="w-full text-left p-2 hover:bg-gray-700">Dashboard</button>
      <button onclick="showTab('inventory')" class="w-full text-left p-2 hover:bg-gray-700">Inventory</button>
      <button onclick="showTab('sales')" class="w-full text-left p-2 hover:bg-gray-700">Sales</button>
    </div>

    <!-- Content -->
    <div class="flex-1 p-6">
      
      <!-- Dashboard -->
      <div id="dashboard" class="tab">
        <h1 class="text-2xl font-bold mb-4">Dashboard</h1>
        <canvas id="salesChart"></canvas>
      </div>

      <!-- Inventory -->
      <div id="inventory" class="tab hidden">
        <h1 class="text-2xl font-bold mb-4">Inventory</h1>
        <input id="itemName" placeholder="Item Name" class="border p-2 mr-2">
        <input id="itemQty" type="number" placeholder="Quantity" class="border p-2 mr-2">
        <button onclick="addItem()" class="bg-blue-500 text-white px-4 py-2">Add</button>

        <ul id="inventoryList" class="mt-4"></ul>
      </div>

      <!-- Sales -->
      <div id="sales" class="tab hidden">
        <h1 class="text-2xl font-bold mb-4">Sales</h1>
        <input id="saleItem" placeholder="Item" class="border p-2 mr-2">
        <input id="saleAmount" type="number" placeholder="Amount" class="border p-2 mr-2">
        <button onclick="addSale()" class="bg-green-500 text-white px-4 py-2">Add Sale</button>

        <ul id="salesList" class="mt-4"></ul>
      </div>

    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
